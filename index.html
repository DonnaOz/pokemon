<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Pokémon Battle Buddy</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body::before{content:'';position:fixed;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#F08030,#F8D030,#78C850,#6890F0,#EE99AC,#7038F8,#F08030);z-index:999}
body{font-family:'Nunito',-apple-system,'Helvetica Neue',sans-serif;background:#f0f4ff;min-height:100vh;color:#1a1a2e;overflow-x:hidden;padding-top:5px}

.pb{position:fixed;pointer-events:none;z-index:0}
.spk{position:fixed;pointer-events:none;z-index:0;border-radius:50%;animation:twink var(--d) ease-in-out infinite var(--del)}
@keyframes twink{0%,100%{opacity:.05;transform:scale(1)}50%{opacity:.18;transform:scale(1.6)}}
.bgico{position:fixed;pointer-events:none;z-index:0;opacity:.04}

.app{max-width:1080px;margin:0 auto;padding:14px 14px 40px;position:relative;z-index:1}

/* HEADER */
.header{text-align:center;padding:20px 10px 16px}
.title-row{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.app-title{font-family:'Bangers',Impact,'Arial Black',sans-serif;font-size:clamp(32px,8vw,60px);color:#FFD700;-webkit-text-stroke:3px #1a5fa8;text-shadow:3px 3px 0 #1a5fa8,-1px -1px 0 #1a5fa8,1px -1px 0 #1a5fa8,-1px 1px 0 #1a5fa8;letter-spacing:2px;line-height:1.05}
.hdeco{font-size:clamp(22px,4vw,34px);animation:spin var(--s,7s) linear infinite;display:inline-block;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.tagline-wrap{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px}
.app-tagline{font-size:clamp(13px,2.5vw,17px);font-weight:800;color:#3b4a7a}

/* CTRL PANEL */
.ctrl{background:white;border-radius:22px;padding:18px;margin-bottom:14px;box-shadow:0 4px 24px rgba(0,0,80,.09);border:1.5px solid rgba(180,195,255,.4)}
.search-row{display:flex;gap:9px;margin-bottom:14px;align-items:stretch}
.sw{flex:1;position:relative}
.si{width:100%;height:54px;padding:0 16px 0 50px;font-size:17px;font-weight:700;font-family:inherit;background:white;border:2px solid #dde3ff;border-radius:14px;color:#1a1a2e;outline:none;-webkit-appearance:none;transition:border-color .2s}
.si::placeholder{color:#a8b0cc}
.si:focus{border-color:#5b8af5;box-shadow:0 0 0 3px rgba(91,138,245,.1)}
.sico{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:22px;pointer-events:none}
.mic-btn,.find-btn{height:54px;border-radius:14px;border:2px solid;font-family:inherit;font-weight:800;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.mic-btn{width:54px;background:white;border-color:#dde3ff;color:#3b4a7a;font-size:24px}
.mic-btn.listening{background:#FF3B30;border-color:#FF3B30;color:white;animation:pred 1s infinite}
.mic-btn:active{transform:scale(.92)}
@keyframes pred{0%,100%{box-shadow:0 0 0 0 rgba(255,59,48,.45)}50%{box-shadow:0 0 0 9px rgba(255,59,48,0)}}
.find-btn{padding:0 22px;background:linear-gradient(135deg,#FFD700,#FFA500);border-color:transparent;color:#5a2800;font-size:16px;box-shadow:0 3px 10px rgba(255,165,0,.25)}
.find-btn:active{transform:scale(.96)}

.type-row{display:flex;gap:12px}
.tg{flex:1}
.tlbl{font-size:11px;font-weight:800;color:#8090b8;text-transform:uppercase;letter-spacing:1.4px;margin-bottom:7px}

/* CUSTOM DROPDOWN */
.cdr-outer{position:relative;z-index:10}
.cdr-outer.is-open{z-index:50}
.cdr-btn{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 14px;background:white;border:2px solid #dde3ff;border-radius:14px;cursor:pointer;min-height:54px;transition:border-color .2s,box-shadow .2s;-webkit-tap-highlight-color:transparent;user-select:none}
.cdr-btn:hover{border-color:#a0b4ff}
.cdr-btn.open{border-color:#5b8af5;box-shadow:0 0 0 3px rgba(91,138,245,.1)}
.cdr-val{display:flex;align-items:center;gap:8px;min-width:0;overflow:hidden;flex:1}
.cdr-ph{font-size:15px;font-weight:700;color:#a0a8c8;white-space:nowrap}
.cdr-arr{flex-shrink:0;transition:transform .25s;width:16px;height:16px;color:#9098b8}
.cdr-btn.open .cdr-arr{transform:rotate(180deg)}
.cdr-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:8px;font-size:13px;font-weight:800;text-transform:uppercase;white-space:nowrap;overflow:hidden;max-width:100%}
.cdr-pill-ico{width:22px;height:22px;flex-shrink:0}
.cdr-list{position:absolute;top:calc(100% + 6px);left:0;right:0;background:white;border:2px solid #dde3ff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,80,.14);z-index:200;padding:10px;display:none;flex-wrap:wrap;gap:6px;max-height:310px;overflow-y:auto}
.cdr-list.open{display:flex}
.cdr-opt{display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:800;text-transform:uppercase;transition:opacity .15s,transform .1s;color:white;-webkit-tap-highlight-color:transparent;user-select:none}
.cdr-opt:active{transform:scale(.93)}
.cdr-opt-ico{width:20px;height:20px;flex-shrink:0}
.cdr-none{background:#f0f2fa!important;color:#6070a0!important;width:100%;justify-content:center;font-size:13px;border-radius:10px;padding:8px 10px}

/* STATUS */
.sbar{min-height:34px;display:flex;align-items:center;justify-content:center;margin-top:11px;font-size:14px;font-weight:700;border-radius:10px;padding:0 12px;text-align:center;transition:all .3s}
.sbar.hid{opacity:0;pointer-events:none}
.sbar.loading{background:rgba(255,200,0,.12);color:#8a6000}
.sbar.success{background:rgba(52,199,89,.12);color:#1a7a3a}
.sbar.error{background:rgba(255,59,48,.12);color:#c01020}

.pokename{text-align:center;margin-bottom:12px;font-size:17px;font-weight:800;color:#3b4a7a;min-height:26px}

/* RESULTS */
.rg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.empty-msg{grid-column:1/-1;text-align:center;padding:50px 20px;font-size:18px;font-weight:700;color:#a0a8c8}
.rcol{background:white;border-radius:18px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,80,.08);border:1.5px solid rgba(180,195,255,.3)}
.chead{padding:14px 10px;text-align:center;height:78px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ctitle{font-size:14px;font-weight:900;color:white;text-transform:uppercase;letter-spacing:.3px;line-height:1.2}
.csub{font-size:11px;color:rgba(255,255,255,.9);margin-top:4px;font-weight:700;line-height:1.3}
.tent{display:flex;align-items:center;justify-content:space-between;padding:9px 10px;border-bottom:1px solid #f0f2fc;animation:popIn .3s ease both}
.tent:last-child{border-bottom:none}
.tent:hover{background:#f8f9ff}
@keyframes popIn{from{opacity:0;transform:translateY(-5px) scale(.97)}to{opacity:1;transform:none}}
.tleft{display:flex;align-items:center;gap:7px}
/* Icon container - swap-friendly:
   To swap to image URL, replace innerHTML with:
   <img src="YOUR_URL" width="34" height="34" style="display:block"> */
.ticon{width:34px;height:34px;flex-shrink:0}
.tname{padding:5px 10px;border-radius:8px;font-size:clamp(11px,1.8vw,14px);font-weight:800;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.mb{display:flex;align-items:center;justify-content:center;border-radius:9px;padding:5px 9px;font-weight:900;flex-shrink:0;gap:3px}
.m4{background:linear-gradient(135deg,#FFD700,#FF8C00);color:#5a2800;font-size:clamp(15px,2.5vw,21px);animation:ggold 2s ease-in-out infinite}
@keyframes ggold{0%,100%{box-shadow:0 2px 10px rgba(255,180,0,.4)}50%{box-shadow:0 2px 22px rgba(255,180,0,.9)}}
.m2{background:linear-gradient(135deg,#E0E0E0,#A8A8A8);color:#444;font-size:clamp(13px,2.2vw,18px);box-shadow:0 2px 6px rgba(0,0,0,.14)}
.mneu{color:#c0c8e0;font-size:20px}
.mhalf{background:linear-gradient(135deg,#FF8888,#EE2222);color:white}
.mqtr{background:linear-gradient(135deg,#CC0000,#7a0000);color:white}
.mimm{background:linear-gradient(135deg,#4A90D9,#1A5FBB);color:white;font-size:clamp(9px,1.4vw,11px);font-weight:900;padding:6px 9px;box-shadow:0 2px 8px rgba(74,144,217,.35);letter-spacing:.5px}
.nent{color:#b0b8d8;font-size:13px;text-align:center;padding:18px;font-weight:700}

@media(max-width:900px){.tname{font-size:11px;padding:4px 7px}.ticon{width:28px;height:28px}.tent{padding:8px 8px}.tleft{gap:5px}}
@media(max-width:900px){
  .rg{grid-template-columns:1fr 1fr;gap:10px}.rcol:last-child{grid-column:1/-1}
}
@media(max-width:640px){
  .tname{font-size:10px;padding:3px 6px}.ticon{width:24px;height:24px}.rg{gap:8px}.app{padding:10px 10px 30px}.ctrl{padding:14px}
  .search-row{gap:6px;margin-bottom:10px}.si,.mic-btn,.find-btn{height:48px}.find-btn{font-size:14px;padding:0 16px}
  .type-row{gap:8px}.tg{min-width:0}.cdr-list{max-height:280px}.type-row .tlbl{margin-bottom:5px}
}
@media(max-width:500px){
  .app-title{font-size:clamp(28px,7vw,44px);-webkit-text-stroke:2px #1a5fa8}
  .tagline-wrap{flex-direction:column;gap:3px}.app-tagline{font-size:12px}
  .hdeco{font-size:20px}.tent{padding:7px 8px}.tname{display:none}.rg{grid-template-columns:1fr;gap:8px}.rcol:last-child{grid-column:auto}
  .chead{padding:12px 8px;height:auto}.ctitle{font-size:13px}.csub{font-size:10px;margin-top:3px}
  .search-row{flex-direction:column}.si{width:100%;padding:0 12px 0 42px}.mic-btn{width:100%;height:42px}.find-btn{width:100%;height:42px;font-size:14px}
  .ctrl{padding:12px}.tg:nth-child(2){margin-top:4px}
}
</style>
</head>
<body>

<!-- Pokéballs (faded red on white) -->
<div id="pbs"></div>
<div id="bgicos"></div>
<div id="spks"></div>

<div class="app">
  <header class="header">
    <div class="title-row">
      <span class="hdeco" style="--s:9s">⚡</span>
      <span class="app-title">Pokémon Battle Buddy</span>
      <span class="hdeco" style="--s:12s">🌟</span>
    </div>
    <div class="tagline-wrap">
      <span>🔥</span>
      <span class="app-tagline">Know your type, win the fight!</span>
      <span>🏆</span>
    </div>
  </header>

  <div class="ctrl">
    <div class="search-row">
      <div class="sw">
        <span class="sico">🔍</span>
        <input class="si" id="si" type="text" placeholder="Search Pokémon (e.g. Pikachu, Charizard)..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      </div>
      <button class="mic-btn" id="mic">🎤</button>
      <button class="find-btn" id="findbtn">Find!</button>
    </div>
    <div class="type-row">
      <div class="tg">
        <div class="tlbl">Type 1 (required)</div>
        <div class="cdr-outer" id="do1">
          <div class="cdr-btn" id="db1">
            <div class="cdr-val"><span class="cdr-ph">— Pick a type —</span></div>
            <svg class="cdr-arr" viewBox="0 0 16 16"><path d="M2 5l6 6 6-6" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="cdr-list" id="dl1"></div>
        </div>
      </div>
      <div class="tg">
        <div class="tlbl">Type 2 (optional)</div>
        <div class="cdr-outer" id="do2">
          <div class="cdr-btn" id="db2">
            <div class="cdr-val"><span class="cdr-ph">— None —</span></div>
            <svg class="cdr-arr" viewBox="0 0 16 16"><path d="M2 5l6 6 6-6" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="cdr-list" id="dl2"></div>
        </div>
      </div>
    </div>
    <div class="sbar hid" id="sbar"></div>
  </div>

  <div class="pokename" id="pkname"></div>
  <div class="rg" id="rg"><div class="empty-msg">⚔️ Pick a type or search a Pokémon to begin!</div></div>
</div>

// ═══ LOGIC ═══
function calcEff(t1,t2){
  const o={};
  for(const a of T){let m=CHART[t1][a];if(t2)m*=CHART[t2][a];o[a]=m;}
  return o;
}

function badge(m){
  if(m===4)return`<div class="mb m4">4×</div>`;
  if(m===2)return`<div class="mb m2">2×</div>`;
  if(m===1)return`<span class="mneu">—</span>`;
  if(m===.5)return`<div class="mb mhalf">${SHI}</div>`;
  if(m===.25)return`<div class="mb mqtr">${SHI}${SHI}</div>`;
  if(m===0)return`<div class="mb mimm">🚫 IMMUNE</div>`;
  return`<span>${m}×</span>`;
}

function tRow(atk,m,i){
  return`<div class="tent" style="animation-delay:${i*.065}s">
    <div class="tleft">
      <div class="ticon">${ICONS[atk]}</div>
      <span class="tname" style="background:${TC[atk]};color:${TX[atk]}">${atk.toUpperCase()}</span>
    </div>${badge(m)}</div>`;
}

function tCol(title,sub,grad,entries){
  const rows=entries.length?entries.map(([t,m],i)=>tRow(t,m,i)).join(''):`<div class="nent">None!</div>`;
  return`<div class="rcol"><div class="chead" style="${grad}"><div class="ctitle">${title}</div><div class="csub">${sub}</div></div>${rows}</div>`;
}

function render(t1,t2){
  if(!t1){document.getElementById('rg').innerHTML='<div class="empty-msg">⚔️ Pick a type or search a Pokémon to begin!</div>';return;}
  const e=calcEff(t1,t2),se=[],neu=[],ne=[];
  for(const[t,m]of Object.entries(e)){if(m>1)se.push([t,m]);else if(m===1)neu.push([t,m]);else ne.push([t,m]);}
  se.sort((a,b)=>b[1]-a[1]);ne.sort((a,b)=>b[1]-a[1]);
  document.getElementById('rg').innerHTML=
    tCol('💥 Super Effective','These do BIG damage — use these move types!','background:linear-gradient(135deg,#2ecc71,#17a34a)',se)+
    tCol('😐 Normal Damage','These do normal damage','background:linear-gradient(135deg,#f39c12,#d68910)',neu)+
    tCol('🛡️ Not Effective',"Don't use these move types!",'background:linear-gradient(135deg,#e74c3c,#c0392b)',ne);
}

// ═══ CUSTOM DROPDOWN ═══
let activeDD=null;
function closeAll(){
  if(activeDD){activeDD.btn.classList.remove('open');activeDD.list.classList.remove('open');activeDD.outer.classList.remove('is-open');activeDD=null;}
}
document.addEventListener('click',closeAll);

function makeDD(btnId,listId,outerId,isOpt,defaultPh,onChange){
  const btn=document.getElementById(btnId),list=document.getElementById(listId),outer=document.getElementById(outerId);
  let val='';

  function setTrigger(v){
    const el=btn.querySelector('.cdr-val');
    if(!v){el.innerHTML=`<span class="cdr-ph">${defaultPh}</span>`;}
    else{el.innerHTML=`<div class="cdr-pill" style="background:${TC[v]};color:${TX[v]}"><div class="cdr-pill-ico">${ICONS[v]}</div><span>${v.toUpperCase()}</span></div>`;}
  }

  if(isOpt){
    const n=document.createElement('div');
    n.className='cdr-opt cdr-none';n.textContent='— None (Single Type) —';
    n.addEventListener('click',e=>{e.stopPropagation();val='';setTrigger('');closeAll();onChange('');});
    list.appendChild(n);
  }
  T.forEach(type=>{
    const o=document.createElement('div');
    o.className='cdr-opt';o.style.background=TC[type];o.style.color=TX[type];
    o.innerHTML=`<div class="cdr-opt-ico">${ICONS[type]}</div><span>${type.toUpperCase()}</span>`;
    o.addEventListener('click',e=>{e.stopPropagation();val=type;setTrigger(type);closeAll();onChange(type);});
    list.appendChild(o);
  });

  btn.addEventListener('click',e=>{
    e.stopPropagation();
    if(list.classList.contains('open')){closeAll();}
    else{closeAll();btn.classList.add('open');list.classList.add('open');outer.classList.add('is-open');activeDD={btn,list,outer};}
  });

  return{set(v){val=v;setTrigger(v);},get(){return val;}};
}

// ═══ STATUS ═══
let stT;
function status(type,msg){
  const el=document.getElementById('sbar');
  el.className=`sbar ${type}`;el.textContent=msg;
  clearTimeout(stT);if(type!=='loading')stT=setTimeout(()=>el.classList.add('hid'),3800);
}

// ═══ POKÉAPI ═══
let d1,d2;
async function findPoke(raw){
  const name=raw.trim().toLowerCase().replace(/\s+/g,'-');
  if(!name)return;
  status('loading',`Searching for "${raw}"...`);
  try{
    const r=await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
    if(!r.ok)throw 0;
    const data=await r.json();
    const types=data.types.sort((a,b)=>a.slot-b.slot).map(t=>t.type.name.charAt(0).toUpperCase()+t.type.name.slice(1));
    const t1=types[0]||'',t2=types[1]||'';
    d1.set(t1);d2.set(t2);
    const label=types.map(t=>`${t}`).join(' + ');
    const n=data.name.split('-').map(p=>p.charAt(0).toUpperCase()+p.slice(1)).join(' ');
    document.getElementById('pkname').textContent=`${n}: ${label}`;
    render(t1,t2||null);
    status('success',`Found ${n}! 🎉`);
  }catch{status('error',`Couldn't find "${raw}". Try another spelling!`);}
}

// ═══ VOICE ═══
function initVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const btn=document.getElementById('mic');
  if(!SR){btn.style.opacity='.35';btn.title='Voice search needs Safari on iPad';return;}
  const rec=new SR();rec.lang='en-US';rec.maxAlternatives=1;
  rec.onresult=e=>{const t=e.results[0][0].transcript;document.getElementById('si').value=t;findPoke(t);};
  rec.onend=()=>btn.classList.remove('listening');
  rec.onerror=()=>{btn.classList.remove('listening');status('error','Voice error — try again!');};
  btn.addEventListener('click',()=>{
    if(btn.classList.contains('listening')){rec.stop();}
    else{btn.classList.add('listening');try{rec.start();}catch{btn.classList.remove('listening');}}
  });
}

// ═══ DECORATIONS ═══
function buildDecos(){
  // Pokéballs (faded red)
  const pbCfg=[
    {w:300,top:'-90px',right:'-90px',left:'auto',bottom:'auto',op:1},
    {w:200,bottom:'-55px',left:'-55px',top:'auto',right:'auto',op:1},
    {w:130,top:'42%',right:'6px',left:'auto',bottom:'auto',op:.5},
    {w:110,top:'62%',left:'4px',right:'auto',bottom:'auto',op:.4},
    {w:80,top:'20%',left:'2%',right:'auto',bottom:'auto',op:.3},
  ];
  const pbWrap=document.getElementById('pbs');
  pbCfg.forEach(c=>{
    const d=document.createElement('div');
    d.className='pb';
    d.style.cssText=`width:${c.w}px;height:${c.w}px;top:${c.top};bottom:${c.bottom};left:${c.left};right:${c.right};opacity:${c.op}`;
    d.innerHTML=PB_SVG;pbWrap.appendChild(d);
  });

  // Scattered background type icons (very faint)
  const bgTypes=['Fire','Water','Dragon','Electric','Ghost','Fairy','Psychic'];
  const bgWrap=document.getElementById('bgicos');
  bgTypes.forEach(t=>{
    const d=document.createElement('div');
    d.className='bgico';
    const sz=50+Math.floor(Math.random()*50);
    d.style.cssText=`width:${sz}px;height:${sz}px;top:${8+Math.random()*80}%;left:${4+Math.random()*92}%;transform:rotate(${Math.random()*30-15}deg);opacity:${.03+Math.random()*.03}`;
    d.innerHTML=ICONS[t];bgWrap.appendChild(d);
  });

  // Coloured sparkle dots
  const spkColors=['#F08030','#F8D030','#6890F0','#78C850','#EE99AC','#7038F8','#F85888'];
  const spkWrap=document.getElementById('spks');
  for(let i=0;i<30;i++){
    const s=document.createElement('div');s.className='spk';
    const sz=3+Math.random()*4;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;background:${spkColors[i%spkColors.length]};--d:${2.5+Math.random()*4}s;--del:-${Math.random()*4}s`;
    spkWrap.appendChild(s);
  }
}

// ═══ INIT ═══
buildDecos();
d1=makeDD('db1','dl1','do1',false,'— Pick a type —',v=>{document.getElementById('pkname').textContent='';render(v||null,d2.get()||null);});
d2=makeDD('db2','dl2','do2',true,'— None —',v=>{document.getElementById('pkname').textContent='';render(d1.get()||null,v||null);});
initVoice();
document.getElementById('findbtn').addEventListener('click',()=>findPoke(document.getElementById('si').value));
document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter')findPoke(e.target.value);});
</script>
